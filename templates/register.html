{% extends "base.html" %}

{% block title %}Register - NetWatch P2P{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 400px;
        margin: 5rem auto;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 2rem;">📡 NetWatch - Create Account</h2>
        
        <form method="POST">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Choose a unique username">
            </div>
            
            <div class="input-group">
                <label for="device_name">Device Name</label>
                <input type="text" id="device_name" name="device_name" placeholder="e.g. My Phone" value="My Device">
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a password">
            </div>
            
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
        
        <p style="text-align: center; margin-top: 1rem;">
            Already have an account? <a href="{{ url_for('login') }}" style="color: #00d4aa; text-decoration: none;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
